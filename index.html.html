<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ஆறாம் ஆண்டு வடிவியல் வினாடி வினா</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Tamil', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl glass-card rounded-3xl shadow-2xl p-6 md:p-10 border-4 border-green-400">
        <!-- Start Screen -->
        <div id="start-screen" class="text-center animate-fade-in">
            <div class="text-6xl mb-6">📐📏</div>
            <h1 class="text-3xl md:text-4xl font-bold text-green-800 mb-4">வடிவியல் வினாடி வினா</h1>
            <p class="text-lg text-gray-600 mb-8">ஆறாம் ஆண்டு - SJKT மாணவர்களுக்கான கணிதப் பயிற்சி</p>
            <button onclick="startQuiz()" class="bg-green-600 hover:bg-green-500 text-white font-bold py-4 px-8 rounded-full text-xl shadow-lg transform transition hover:scale-105 active:scale-95">
                வினாடி வினாவைத் தொடங்கு 🚀
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden animate-fade-in">
            <div class="flex justify-between items-center mb-6 border-b-2 border-gray-200 pb-4">
                <span id="question-tracker" class="text-lg font-bold text-gray-500">கேள்வி 1 / 10</span>
                <span id="score-tracker" class="text-lg font-bold text-green-600 bg-green-100 px-4 py-1 rounded-full">மதிப்பெண்: 0</span>
            </div>
            
            <div id="progress-bar" class="w-full bg-gray-200 rounded-full h-2.5 mb-8">
                <div id="progress" class="bg-green-600 h-2.5 rounded-full transition-all duration-300" style="width: 10%"></div>
            </div>

            <h2 id="question-text" class="text-2xl font-bold text-gray-800 mb-6 leading-relaxed"></h2>
            
            <div id="options-container" class="space-y-4">
                <!-- Options will be injected here -->
            </div>

            <div id="feedback-container" class="hidden mt-6 p-4 rounded-xl">
                <p id="feedback-message" class="font-bold text-lg mb-2"></p>
                <p id="feedback-rationale" class="text-gray-700"></p>
            </div>

            <div class="mt-8 text-right hidden" id="next-btn-container">
                <button onclick="nextQuestion()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl shadow transform transition hover:scale-105 active:scale-95">
                    அடுத்த கேள்வி ➡️
                </button>
            </div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="hidden text-center animate-fade-in">
            <div class="text-7xl mb-6" id="end-emoji">🏆</div>
            <h2 class="text-3xl font-bold text-gray-800 mb-4">வினாடி வினா முடிவுற்றது!</h2>
            <p class="text-xl text-gray-600 mb-6">உங்கள் மொத்த மதிப்பெண்:</p>
            <div class="text-5xl font-bold text-green-600 mb-8" id="final-score">0 / 10</div>
            <p id="final-message" class="text-lg font-semibold text-gray-700 mb-8"></p>
            
            <button onclick="restartQuiz()" class="bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 px-8 rounded-full text-lg shadow-lg transform transition hover:scale-105 active:scale-95">
                மீண்டும் விளையாடு 🔄
            </button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "(எளிமையானது) கனச்செவ்வகத்தின் (Cuboid) கொள்ளளவைக் கணக்கிடும் சரியான சூத்திரம் என்ன?",
                options: ["நீளம் + அகலம் + உயரம்", "நீளம் × அகலம் × உயரம்", "நீளம் × அகலம்", "அடிப்பக்கம் × உயரம்"],
                correct: 1,
                rationale: "கனச்செவ்வகத்தின் கொள்ளளவைக் கண்டறிய அதன் மூன்று பரிமாணங்களையும் (நீளம், அகலம், உயரம்) பெருக்க வேண்டும்."
            },
            {
                question: "(எளிமையானது) 6 சமமான பக்கங்களைக் கொண்ட பலகோணத்தின் (Polygon) பெயர் என்ன?",
                options: ["ஐங்கோணம்", "எண்கோணம்", "அறுகோணம்", "எழுகோணம்"],
                correct: 2,
                rationale: "ஆறு பக்கங்களைக் கொண்ட பலகோணம் அறுகோணம் (Hexagon) என்று அழைக்கப்படுகிறது."
            },
            {
                question: "(எளிமையானது) ஒரு முக்கோணத்தின் அகக்கோணங்களின் (Interior angles) மொத்தக் கூட்டுத்தொகை எவ்வளவு?",
                options: ["90°", "360°", "180°", "270°"],
                correct: 2,
                rationale: "எந்தவொரு முக்கோணத்தின் மூன்று அகக்கோணங்களைக் கூட்டினாலும் 180° கிடைக்கும்."
            },
            {
                question: "(இடைநிலையானது) 8 செ.மீ பக்க நீளம் கொண்ட ஒரு சதுரத்தின் பரப்பளவைக் (Area) கணக்கிடுக.",
                options: ["16 செ.மீ²", "64 செ.மீ²", "32 செ.மீ²", "24 செ.மீ²"],
                correct: 1,
                rationale: "சதுரத்தின் பரப்பளவு = நீளம் × அகலம். (8 × 8 = 64 செ.மீ²)."
            },
            {
                question: "(இடைநிலையானது) ஒரு கனச்சதுரத்தின் (Cube) பக்க நீளம் 5 செ.மீ ஆகும். அதன் கொள்ளளவு (Volume) என்ன?",
                options: ["25 செ.மீ³", "150 செ.மீ³", "15 செ.மீ³", "125 செ.மீ³"],
                correct: 3,
                rationale: "கனச்சதுரத்தின் கொள்ளளவு = பக்க நீளம் × பக்க நீளம் × பக்க நீளம் (5 × 5 × 5 = 125 செ.மீ³)."
            },
            {
                question: "(இடைநிலையானது) ஒரு சீரான அறுகோணத்தின் (Regular Hexagon) ஒரு அகக்கோணத்தின் அளவு என்ன?",
                options: ["108°", "120°", "135°", "90°"],
                correct: 1,
                rationale: "அறுகோணத்தின் மொத்த அகக்கோணம் 720°. இதை 6 ஆல் வகுத்தால் 120° கிடைக்கும்."
            },
            {
                question: "(இடைநிலையானது) 12 செ.மீ நீளமும் 5 செ.மீ அகலமும் கொண்ட ஒரு செவ்வகத்தின் பரப்பளவைக் கணக்கிடுக.",
                options: ["34 செ.மீ²", "60 செ.மீ²", "17 செ.மீ²", "120 செ.மீ²"],
                correct: 1,
                rationale: "செவ்வகத்தின் பரப்பளவு = நீளம் × அகலம் (12 × 5 = 60 செ.மீ²)."
            },
            {
                question: "(கடினமானது) ஒரு கனச்செவ்வகத்தின் கொள்ளளவு 240 செ.மீ³. அதன் நீளம் 8 செ.மீ மற்றும் அகலம் 5 செ.மீ எனில், அதன் உயரம் என்ன?",
                options: ["6 செ.மீ", "8 செ.மீ", "10 செ.மீ", "4 செ.மீ"],
                correct: 0,
                rationale: "உயரம் = கொள்ளளவு ÷ (நீளம் × அகலம்). அதாவது 240 ÷ (8 × 5) = 240 ÷ 40 = 6 செ.மீ."
            },
            {
                question: "(கடினமானது) ஒரு இணைந்த இருபரிமாண வடிவம், 4 செ.மீ பக்க அளவுள்ள ஒரு சதுரத்தையும், 10 செ.மீ நீளமும் 3 செ.மீ அகலமும் கொண்ட ஒரு செவ்வகத்தையும் கொண்டுள்ளது. இதன் மொத்த பரப்பளவு என்ன?",
                options: ["34 செ.மீ²", "46 செ.மீ²", "42 செ.மீ²", "52 செ.மீ²"],
                correct: 1,
                rationale: "சதுரத்தின் பரப்பளவு (4×4=16) மற்றும் செவ்வகத்தின் பரப்பளவு (10×3=30). மொத்தம் = 16 + 30 = 46 செ.மீ²."
            },
            {
                question: "(கடினமானது) ஒரு கனச்சதுரத்தின் மொத்த மேற்பரப்பளவு (Total Surface Area) 150 செ.மீ² ஆகும். அந்த கனச்சதுரத்தின் கொள்ளளவு (Volume) என்ன?",
                options: ["25 செ.மீ³", "600 செ.மீ³", "125 செ.மீ³", "150 செ.மீ³"],
                correct: 2,
                rationale: "ஒரு முகத்தின் பரப்பளவு = 150 ÷ 6 = 25. எனவே ஒரு பக்க நீளம் 5 செ.மீ. கொள்ளளவு = 5 × 5 × 5 = 125 செ.மீ³."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const endScreen = document.getElementById('end-screen');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const questionTracker = document.getElementById('question-tracker');
        const scoreTracker = document.getElementById('score-tracker');
        const progressBar = document.getElementById('progress');
        const feedbackContainer = document.getElementById('feedback-container');
        const feedbackMessage = document.getElementById('feedback-message');
        const feedbackRationale = document.getElementById('feedback-rationale');
        const nextBtnContainer = document.getElementById('next-btn-container');

        function startQuiz() {
            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            currentQuestion = 0;
            score = 0;
            loadQuestion();
        }

        function loadQuestion() {
            answered = false;
            feedbackContainer.classList.add('hidden');
            nextBtnContainer.classList.add('hidden');
            
            const q = quizData[currentQuestion];
            questionText.innerText = q.question;
            questionTracker.innerText = `கேள்வி ${currentQuestion + 1} / ${quizData.length}`;
            scoreTracker.innerText = `மதிப்பெண்: ${score}`;
            progressBar.style.width = `${((currentQuestion + 1) / quizData.length) * 100}%`;

            optionsContainer.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-4 rounded-xl border-2 border-gray-200 hover:border-green-400 hover:bg-green-50 transition-all font-semibold text-gray-700 bg-white';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, selectedBtn) {
            if (answered) return;
            answered = true;

            const q = quizData[currentQuestion];
            const buttons = optionsContainer.children;

            if (selectedIndex === q.correct) {
                score++;
                scoreTracker.innerText = `மதிப்பெண்: ${score}`;
                selectedBtn.classList.remove('border-gray-200', 'hover:bg-green-50');
                selectedBtn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                showFeedback(true, "✅ மிகச் சிறப்பு! சரியான விடை.", q.rationale);
            } else {
                selectedBtn.classList.remove('border-gray-200', 'hover:bg-green-50');
                selectedBtn.classList.add('bg-red-500', 'text-white', 'border-red-600');
                
                // Highlight correct answer
                buttons[q.correct].classList.remove('border-gray-200');
                buttons[q.correct].classList.add('border-green-500', 'bg-green-100', 'text-green-800');
                showFeedback(false, "❌ தவறான விடை.", q.rationale);
            }

            // Disable all buttons
            for (let btn of buttons) {
                btn.onclick = null;
                btn.classList.add('cursor-default');
                btn.classList.remove('hover:border-green-400', 'hover:bg-green-50');
            }

            nextBtnContainer.classList.remove('hidden');
        }

        function showFeedback(isCorrect, msg, rationale) {
            feedbackContainer.classList.remove('hidden', 'bg-green-100', 'bg-red-100', 'text-green-800', 'text-red-800');
            if (isCorrect) {
                feedbackContainer.classList.add('bg-green-100', 'text-green-800');
            } else {
                feedbackContainer.classList.add('bg-red-100', 'text-red-800');
            }
            feedbackMessage.innerText = msg;
            feedbackRationale.innerText = rationale;
            feedbackContainer.classList.add('animate-fade-in');
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            quizScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');
            
            document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
            
            let message = "";
            let emoji = "🏆";
            if (score === 10) {
                message = "அற்புதம்! நீங்கள் வடிவியலில் மிகச் சிறந்த மாணவர்! 🌟";
                emoji = "👑";
            } else if (score >= 7) {
                message = "சிறப்பான முயற்சி! நல்ல புரிதல் உள்ளது. 👍";
                emoji = "🌟";
            } else if (score >= 4) {
                message = "நல்லது. இன்னும் கொஞ்சம் பயிற்சி செய்தால் முழு மதிப்பெண் பெறலாம். 📚";
                emoji = "👍";
            } else {
                message = "கவலை வேண்டாம்! மீண்டும் படித்துப் பயிற்சி செய்யுங்கள். உங்களால் முடியும்! 💪";
                emoji = "🌱";
            }
            
            document.getElementById('final-message').innerText = message;
            document.getElementById('end-emoji').innerText = emoji;
        }

        function restartQuiz() {
            endScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
